<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Fareyle Kopyala Yapıştır (CopyTextMouse) Ayarlar</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        label, input { vertical-align: middle; }
        input[type="number"] { width: 60px; }
    </style>
</head>
<body>
    <h2>Fareyle Kopyala Yapıştır (CopyTextMouse) - Ayarlar</h2>
    <p>Seçili metni fareyle kopyalamak için aşağıdaki ayarları düzenleyebilirsiniz.</p>
    <hr>
    <div>
        <label for="copytextmouseTime">Metni kopyalama süresi (saniye):</label>
        <input id="copytextmouseTime" min="0.1" step="0.1" type="number">
    </div>
    <br>
    <div>
        <input id="pasteOnMiddleClick" type="checkbox">
        <label for="pasteOnMiddleClick">Orta fare tuşuyla yapıştırmayı etkinleştir.</label>
    </div>
    <br>
    <div>
        <input id="collapseSelection" type="checkbox">
        <label for="collapseSelection">Kopyalayınca seçimi kaldır.</label>
    </div>
    <br>
    <div>
        <input id="copyPlainText" type="checkbox">
        <label for="copyPlainText">Metni düz metin olarak kopyala (Plain Text Biçimlendirmeyi yok say).</label>
    </div>
    <br>
    <div>
        <input id="copyProtectionBreak" type="checkbox">
        <label for="copyProtectionBreak">Kopya korumalı sitelerde metin seçimini etkinleştir.</label>
    </div>

    <script src="options.js"></script>
</body>
</html>
